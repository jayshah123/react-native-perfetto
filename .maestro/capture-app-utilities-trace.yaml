appId: perfetto.example
---
- launchApp
- extendedWaitUntil:
    visible: "App Utilities JSI Example"
    timeout: 30000
- assertVisible: "Install status: Utility bindings installed"
- assertVisible: "Diagnostics captured: no"
- tapOn:
    id: "runDiagnosticsCaptureButton"
- extendedWaitUntil:
    visible: "Install status: Utility diagnostics capture completed"
    timeout: 60000
- extendedWaitUntil:
    visible:
      id: "diagnosticsCapturedText"
    timeout: 30000
- assertVisible: "Diagnostics captured: yes"
- assertVisible: "Diagnostics path available: yes"
- assertVisible:
    id: "diagnosticsPathText"
